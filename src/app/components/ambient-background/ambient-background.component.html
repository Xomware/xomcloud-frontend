<div class="ambient-arena" aria-hidden="true">
  <svg
    #ambientSvg
    viewBox="0 0 1920 1080"
    xmlns="http://www.w3.org/2000/svg"
    class="ambient-svg"
    preserveAspectRatio="xMidYMid slice"
  >
    <defs>
      <radialGradient id="blobShine" cx="35%" cy="30%">
        <stop offset="0%" stop-color="rgba(255,255,255,0.12)" />
        <stop offset="100%" stop-color="rgba(255,255,255,0)" />
      </radialGradient>
      <filter id="blobBlur">
        <feGaussianBlur stdDeviation="3" />
      </filter>
      <filter id="lightningGlow">
        <feGaussianBlur stdDeviation="6" result="blur" />
        <feMerge>
          <feMergeNode in="blur" />
          <feMergeNode in="blur" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>
    </defs>

    <!-- Lightning layer -->
    <g class="lightning-layer"></g>

    <!-- Blob 0 - orange -->
    <g class="blob blob-0" filter="url(#blobBlur)">
      <ellipse rx="18" ry="16" fill="#ff6b35" opacity="0.18" class="b-body" />
      <ellipse cx="-5" cy="-6" rx="7" ry="4" fill="url(#blobShine)" />
    </g>

    <!-- Blob 1 - pink -->
    <g class="blob blob-1" filter="url(#blobBlur)">
      <ellipse rx="18" ry="16" fill="#e94e77" opacity="0.18" class="b-body" />
      <ellipse cx="-5" cy="-6" rx="7" ry="4" fill="url(#blobShine)" />
    </g>

    <!-- Blob 2 - orange -->
    <g class="blob blob-2" filter="url(#blobBlur)">
      <ellipse rx="18" ry="16" fill="#f7931e" opacity="0.18" class="b-body" />
      <ellipse cx="-5" cy="-6" rx="7" ry="4" fill="url(#blobShine)" />
    </g>

    <!-- Blob 3 - pink -->
    <g class="blob blob-3" filter="url(#blobBlur)">
      <ellipse rx="18" ry="16" fill="#e94e77" opacity="0.18" class="b-body" />
      <ellipse cx="-5" cy="-6" rx="7" ry="4" fill="url(#blobShine)" />
    </g>

    <!-- Blob 4 - light orange -->
    <g class="blob blob-4" filter="url(#blobBlur)">
      <ellipse rx="18" ry="16" fill="#ff8c5a" opacity="0.18" class="b-body" />
      <ellipse cx="-5" cy="-6" rx="7" ry="4" fill="url(#blobShine)" />
    </g>

    <!-- Blob 5 - orange -->
    <g class="blob blob-5" filter="url(#blobBlur)">
      <ellipse rx="18" ry="16" fill="#ff6b35" opacity="0.18" class="b-body" />
      <ellipse cx="-5" cy="-6" rx="7" ry="4" fill="url(#blobShine)" />
    </g>
  </svg>
</div>
