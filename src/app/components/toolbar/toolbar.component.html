<div class="toolbar" [ngClass]="{ 'show-dropdown': dropdownVisible }" *ngIf="!isCallbackPage">
  <a routerLink="/home" class="app-title">
    <img
      src="assets/img/xomcloud-banner-transparent.png"
      alt="XOMCLOUD"
      class="logo-image"
    />
  </a>

  <div class="tabs" [ngClass]="{ hidden: dropdownVisible }">
    <div *ngIf="isLoggedIn()">
      <a
        routerLink="/my-profile"
        routerLinkActive="active"
        [ngClass]="{ selected: isSelected('/my-profile') }"
      >
        My Profile
      </a>
      <a
        routerLink="/liked-tracks"
        routerLinkActive="active"
        [ngClass]="{ selected: isSelected('/liked-tracks') }"
      >
        Liked Tracks
      </a>
      <a
        routerLink="/playlists"
        routerLinkActive="active"
        [ngClass]="{ selected: isSelected('/playlists') }"
      >
        Playlists
      </a>
      <a
        routerLink="/search"
        routerLinkActive="active"
        [ngClass]="{ selected: isSelected('/search') }"
      >
        Search
      </a>
      <a
        routerLink="/my-crate"
        routerLinkActive="active"
        [ngClass]="{ selected: isSelected('/my-crate') }"
        class="crate-link"
      >
        My Crate
        <span class="crate-badge" *ngIf="queueCount > 0">{{ queueCount }}</span>
      </a>
    </div>
  </div>

  <!-- Logout Button (Desktop) -->
  <button
    class="logout-btn desktop-only"
    *ngIf="isLoggedIn()"
    (click)="logout()"
  >
    Logout
  </button>

  <!-- Dropdown Button (Mobile) -->
  <div class="dropdown-button" *ngIf="isLoggedIn()" (click)="toggleDropdown()">
    <span class="hamburger">☰</span>
  </div>

  <!-- Mobile Dropdown Menu -->
  <div class="dropdown" *ngIf="dropdownVisible">
    <a
      routerLink="/my-profile"
      routerLinkActive="active"
      (click)="selectItem('/my-profile')"
      >My Profile</a
    >
    <a
      routerLink="/liked-tracks"
      routerLinkActive="active"
      (click)="selectItem('/liked-tracks')"
      >Liked Tracks</a
    >
    <a
      routerLink="/playlists"
      routerLinkActive="active"
      (click)="selectItem('/playlists')"
      >Playlists</a
    >
    <a
      routerLink="/search"
      routerLinkActive="active"
      (click)="selectItem('/search')"
      >Search</a
    >
    <a
      routerLink="/my-crate"
      routerLinkActive="active"
      (click)="selectItem('/my-crate')"
      class="crate-link"
    >
      My Crate
      <span class="crate-badge" *ngIf="queueCount > 0">{{ queueCount }}</span>
    </a>
    <a class="logout-link" (click)="logout()">Logout</a>
  </div>
</div>
