<app-loader [loading]="loading" message="Loading your playlists..."></app-loader>

<div class="playlists-container" *ngIf="!loading">
  <!-- Header -->
  <header class="page-header">
    <h1>Playlists</h1>
    
    <div class="tabs">
      <button 
        class="tab-btn"
        [class.active]="activeTab === 'my'"
        (click)="setActiveTab('my')">
        My Playlists ({{ playlists.length }})
      </button>
      <button 
        class="tab-btn"
        [class.active]="activeTab === 'liked'"
        (click)="setActiveTab('liked')">
        Liked ({{ likedPlaylists.length }})
      </button>
    </div>
  </header>

  <!-- Error State -->
  <div class="error-state" *ngIf="error">
    <span class="error-icon">⚠️</span>
    <h2>{{ error }}</h2>
    <button class="retry-btn" (click)="loadPlaylists()">Try Again</button>
  </div>

  <!-- Empty State -->
  <div class="empty-state" *ngIf="!error && getCurrentPlaylists().length === 0">
    <span class="empty-icon">📋</span>
    <h2 *ngIf="activeTab === 'my'">No playlists yet</h2>
    <h2 *ngIf="activeTab === 'liked'">No liked playlists</h2>
    <p>Create or like playlists on SoundCloud to see them here.</p>
  </div>

  <!-- Playlists Grid -->
  <div class="playlists-grid" *ngIf="getCurrentPlaylists().length > 0">
    <div 
      class="playlist-card"
      *ngFor="let playlist of getCurrentPlaylists()"
      (click)="goToPlaylist(playlist)">
      
      <div class="playlist-artwork">
        <img 
          [src]="getArtworkUrl(playlist)" 
          [alt]="playlist.title"
          (error)="onImageError($event, 'assets/img/default-artwork.png')">
        <div class="playlist-overlay">
          <button 
            class="add-all-btn"
            (click)="addPlaylistToQueue(playlist); $event.stopPropagation()"
            title="Add all tracks to crate">
            <svg viewBox="0 0 24 24" width="24" height="24">
              <path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
            </svg>
            Add All
          </button>
        </div>
      </div>
      
      <div class="playlist-info">
        <h3 class="playlist-title">{{ playlist.title }}</h3>
        <p class="playlist-meta">
          {{ playlist.track_count }} tracks • {{ getTotalDuration(playlist) }}
        </p>
        <p class="playlist-user" *ngIf="activeTab === 'liked'">
          by {{ playlist.user.username }}
        </p>
      </div>
    </div>
  </div>
</div>
