<app-loader [loading]="loading" message="Loading playlists..."></app-loader>

<div class="user-playlists-container" *ngIf="!loading">
  <header class="page-header">
    <a routerLink="/my-profile" class="back-link">← Back to Profile</a>
    <h1>{{ username }}'s Playlists</h1>
    <p class="playlist-count" *ngIf="playlists.length > 0">
      {{ playlists.length }} playlists
    </p>
  </header>

  <div class="error-state" *ngIf="error">
    <span class="error-icon">⚠️</span>
    <h2>{{ error }}</h2>
    <button class="retry-btn" (click)="loadPlaylists()">Try Again</button>
  </div>

  <div class="empty-state" *ngIf="!error && playlists.length === 0">
    <span class="empty-icon">📁</span>
    <h2>No playlists found</h2>
    <p>This user hasn't created any playlists yet.</p>
  </div>

  <div class="playlists-grid" *ngIf="playlists.length > 0">
    <div class="playlist-card" *ngFor="let playlist of playlists">
      <div class="playlist-artwork">
        <img
          [src]="getArtworkUrl(playlist)"
          [alt]="playlist.title"
          (error)="onImageError($event, 'assets/img/default-artwork.png')"
        />
        <div class="play-overlay">
          <svg viewBox="0 0 24 24" width="40" height="40">
            <path fill="currentColor" d="M8 5v14l11-7z" />
          </svg>
        </div>
      </div>
      <div class="playlist-info">
        <h3 class="playlist-title">{{ playlist.title }}</h3>
        <p class="playlist-meta">
          {{ playlist.track_count }} tracks • {{ getTotalDuration(playlist) }}
        </p>
      </div>
    </div>
  </div>
</div>
