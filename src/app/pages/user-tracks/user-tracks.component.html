<app-loader [loading]="loading" message="Loading tracks..."></app-loader>

<div class="user-tracks-container" *ngIf="!loading">
  <header class="page-header">
    <a routerLink="/my-profile" class="back-link">← Back to Profile</a>
    <h1>{{ username }}'s Tracks</h1>
    <p class="track-count" *ngIf="tracks.length > 0">
      {{ tracks.length }} tracks
    </p>
  </header>

  <div class="error-state" *ngIf="error">
    <span class="error-icon">⚠️</span>
    <h2>{{ error }}</h2>
    <button class="retry-btn" (click)="loadTracks()">Try Again</button>
  </div>

  <div class="empty-state" *ngIf="!error && tracks.length === 0">
    <span class="empty-icon">🎵</span>
    <h2>No tracks found</h2>
    <p>This user hasn't uploaded any tracks yet.</p>
  </div>

  <div class="tracks-list" *ngIf="tracks.length > 0">
    <div class="track-item" *ngFor="let track of tracks; let i = index">
      <span class="track-number">{{ i + 1 }}</span>

      <div class="track-artwork">
        <img
          [src]="getArtworkUrl(track)"
          [alt]="track.title"
          (error)="onImageError($event, 'assets/img/default-artwork.png')"
        />
        <div class="play-overlay">
          <svg viewBox="0 0 24 24" width="24" height="24">
            <path fill="currentColor" d="M8 5v14l11-7z" />
          </svg>
        </div>
      </div>

      <div class="track-info">
        <h3 class="track-title">{{ track.title }}</h3>
        <p class="track-artist">{{ track.user.username }}</p>
      </div>

      <div class="track-meta">
        <span class="duration">{{ formatDuration(track.duration) }}</span>
        <span class="plays"
          >{{ formatPlayCount(track.playback_count) }} plays</span
        >
      </div>

      <div class="track-actions">
        <button
          class="add-to-queue-btn"
          [class.in-queue]="isInQueue(track.id)"
          [disabled]="isInQueue(track.id)"
          (click)="addToQueue(track)"
          [title]="isInQueue(track.id) ? 'Already in crate' : 'Add to crate'"
        >
          <svg
            *ngIf="!isInQueue(track.id)"
            viewBox="0 0 24 24"
            width="20"
            height="20"
          >
            <path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" />
          </svg>
          <svg
            *ngIf="isInQueue(track.id)"
            viewBox="0 0 24 24"
            width="20"
            height="20"
          >
            <path
              fill="currentColor"
              d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"
            />
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>
